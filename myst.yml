  toc:
    - file: syllabus.tex
    - file: introduction.md
    - title: Pre-knowledge
      children:
        - file: QM.tex
        - file: SM.tex
    - file: emergence.tex
    - title: Emergent phenomena
      children:
        - file: polymer.tex
        - file: metal.tex
  exports:
    - format: pdf
      template: lapreprint-typst
site:
  template: book-theme
